# GalleryOS stack.
#
# Brings up the server plus its backing services (TimescaleDB + Redis). DB/Redis
# ports are published so a host-side `bun --watch` dev server can also connect
# for the simplest hot-reload DX (see RUNNING.md).
#
#   Production-like:  docker compose up -d --build
#   In-container dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "3000:3000" # HTTP API + WebSocket
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://gallery:${DB_PASSWORD:-gallery_dev_password}@postgres:5432/gallery
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server_logs:/app/apps/server/logs
    networks:
      - gallery_net

  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: gallery
      POSTGRES_USER: gallery
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gallery_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gallery"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gallery_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gallery_net

volumes:
  postgres_data:
  redis_data:
  server_logs:

networks:
  gallery_net:
    driver: bridge
