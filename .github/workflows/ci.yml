# GalleryOS CI.
#
# Two jobs:
#   - check:       the gate — type-check (server + UI), server/driver tests, and
#                  UI unit tests must pass. UI lint and fallow run too, but are
#                  informational (they're red on vendored UI primitives / scaffolding).
#   - integration: spins up TimescaleDB + Redis service containers, applies
#                  migrations, and runs the `GALLERY_INTEGRATION=1` suite.
#
# Bun is pinned to the version the production image uses (apps/server/Dockerfile).

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  check:
    name: Type-check, tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check (server + UI)
        run: bun run typecheck

      - name: Server & driver tests
        run: bun test apps/server packages

      - name: UI unit tests
        run: bun run --filter @gallery/ui test:unit:run

      - name: UI lint (informational)
        run: bun run --filter @gallery/ui lint:ci
        continue-on-error: true

      - name: Dead-code check — fallow (informational)
        run: bunx fallow
        continue-on-error: true

  integration:
    name: Integration (Postgres + Redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: gallery
          POSTGRES_USER: gallery
          POSTGRES_PASSWORD: gallery_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gallery"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gallery:gallery_dev_password@localhost:5432/gallery
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations
        run: bun run --filter @gallery/server migrate

      - name: Integration tests
        run: GALLERY_INTEGRATION=1 bun test apps/server/test/integration
